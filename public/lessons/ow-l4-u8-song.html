<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit 8 · Song · What's Your Hobby?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#16A34A; --green-d:#15803D; --green-l:#DCFCE7;
  --blue:#0EA5E9; --blue-l:#E0F2FE;
  --amber:#F59E0B; --amber-l:#FEF3C7;
  --purple:#7C3AED;
  --ink:#14241D; --ink-2:#3F5147; --ink-3:#6B7B73;
  --paper:#FAFAF7; --surface:#FFFFFF; --border:#E3E8E4;
  --rose:#E11D48;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0c1410;font-family:'Outfit',sans-serif;overflow:hidden}
.ja{font-family:'Noto Sans JP','Outfit',sans-serif}

/* ===== Scale wrapper ===== */
#scaler{position:absolute;top:50%;left:50%;width:1920px;height:1080px;transform-origin:center center}
#stage{position:relative;width:1920px;height:1080px;background:var(--paper);overflow:hidden}

/* ===== Slides ===== */
.slide{position:absolute;inset:0;padding:70px 96px 96px;display:none;flex-direction:column;opacity:0;transition:opacity .35s ease}
.slide.active{display:flex;opacity:1}
.slide-tag{display:inline-flex;align-items:center;gap:10px;font-size:19px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--green);margin-bottom:6px}
.slide-tag .dot{width:11px;height:11px;border-radius:50%;background:var(--green)}
.slide-h{font-size:62px;font-weight:800;color:var(--ink);line-height:1.04;letter-spacing:-.01em}
.slide-sub{font-size:26px;color:var(--ink-2);font-weight:500;margin-top:10px}
.slide-num{position:absolute;bottom:24px;right:40px;font-size:17px;font-weight:600;color:var(--ink-3)}

/* ===== Title slide ===== */
.title-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  background:radial-gradient(circle at 30% 20%,#1f7a43 0%,#16A34A 45%,#0f7a55 100%);margin:-70px -96px -96px;color:#fff;position:relative;overflow:hidden}
.title-wrap::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.10) 2px,transparent 2px);background-size:46px 46px;opacity:.5}
.t-note{position:relative;font-size:120px;animation:float 3.2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
.t-badge{position:relative;font-size:22px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;background:rgba(255,255,255,.18);padding:10px 26px;border-radius:999px;margin-bottom:22px}
.t-title{position:relative;font-size:130px;font-weight:900;letter-spacing:-.02em;line-height:.98;text-shadow:0 6px 26px rgba(0,0,0,.25)}
.t-meta{position:relative;display:flex;gap:18px;margin-top:34px;flex-wrap:wrap;justify-content:center}
.t-chip{font-size:24px;font-weight:600;background:rgba(255,255,255,.92);color:var(--green-d);padding:12px 26px;border-radius:14px}
.t-chips-words{position:relative;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:38px;max-width:1300px}
.t-word{font-size:20px;font-weight:600;background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.4);padding:8px 16px;border-radius:999px}

/* ===== Objective cards ===== */
.obj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:26px;margin-top:40px;flex:1;align-content:center}
.obj-card{background:var(--surface);border:2px solid var(--border);border-left:9px solid var(--green);border-radius:20px;padding:30px 34px;display:flex;gap:22px;align-items:flex-start;box-shadow:0 5px 20px rgba(20,40,30,.05)}
.obj-card .ic{font-size:48px;line-height:1}
.obj-card h3{font-size:28px;font-weight:700;color:var(--ink);margin-bottom:6px}
.obj-card p{font-size:21px;color:var(--ink-2);line-height:1.4}
.bigq{margin-top:30px;background:var(--amber-l);border:2px dashed var(--amber);border-radius:18px;padding:24px 34px;display:flex;align-items:center;gap:20px}
.bigq .ic{font-size:44px}
.bigq b{font-size:25px;color:#7c5b06}

/* ===== Vocab game layout ===== */
.vg{flex:1;display:flex;gap:42px;margin-top:26px;min-height:0}
.vg-left{width:35%;display:flex;flex-direction:column;background:var(--surface);border:2px solid var(--border);border-radius:24px;padding:38px 34px;position:relative;overflow:hidden}
.vg-left::before{content:"";position:absolute;top:0;left:0;right:0;height:8px;background:var(--green)}
.vg-tag{font-size:16px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:6px 14px;border-radius:999px;align-self:flex-start;margin-bottom:auto}
.vg-tag.recycle{background:var(--blue-l);color:#075985}
.vg-tag.newword{background:var(--green-l);color:var(--green-d)}
.vg-emoji{font-size:118px;line-height:1;margin:8px 0 6px}
.vg-word{font-size:62px;font-weight:800;color:var(--ink);line-height:1}
.vg-ipa{font-size:25px;color:var(--ink-3);margin-top:8px;font-weight:500}
.vg-pos{display:inline-block;font-size:17px;font-weight:600;color:var(--green-d);background:var(--green-l);padding:4px 12px;border-radius:8px;margin-top:14px}
.vg-dad{margin-top:auto;font-size:21px;color:var(--ink-2);line-height:1.45;border-top:2px solid var(--border);padding-top:18px}
.vg-dad b{color:var(--green-d)}
.vg-right{flex:1;display:flex;flex-direction:column;min-width:0}
.game-bar{display:flex;align-items:center;gap:14px;font-size:20px;font-weight:700;color:var(--ink);background:var(--surface);border:2px solid var(--border);border-radius:16px 16px 0 0;border-bottom:none;padding:16px 26px}
.game-bar .gtype{margin-left:auto;font-size:15px;font-weight:600;color:#fff;background:var(--green);padding:5px 14px;border-radius:999px;letter-spacing:.04em}
.game-area{flex:1;background:var(--surface);border:2px solid var(--border);border-radius:0 0 16px 16px;padding:34px;display:flex;flex-direction:column;justify-content:center;gap:18px;min-height:0;overflow:auto}
.def-box{margin-top:16px;background:var(--green-l);border:2px solid var(--green);border-radius:16px;padding:0 26px;max-height:0;opacity:0;overflow:hidden;transition:all .45s ease}
.def-box.show{max-height:240px;opacity:1;padding:22px 26px}
.def-box .d-l{font-size:15px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--green-d);margin-bottom:6px}
.def-box .d-t{font-size:25px;color:var(--ink);font-weight:500;line-height:1.4}

/* game widgets */
.q-prompt{font-size:30px;font-weight:600;color:var(--ink);line-height:1.35;text-align:center}
.opts{display:flex;flex-wrap:wrap;gap:16px;justify-content:center}
.opt{font-size:25px;font-weight:600;background:#fff;border:2.5px solid var(--border);color:var(--ink);padding:18px 30px;border-radius:16px;cursor:pointer;transition:all .15s;min-width:150px;text-align:center}
.opt:hover{border-color:var(--green);transform:translateY(-2px)}
.opt.correct{background:var(--green);border-color:var(--green);color:#fff;animation:pop .3s}
.opt.wrong{background:#fee2e2;border-color:var(--rose);color:var(--rose)}
@keyframes pop{50%{transform:scale(1.08)}}
.lyric-lines{display:flex;flex-direction:column;gap:14px;max-width:880px;margin:0 auto;width:100%}
.lyric-line{font-size:25px;font-weight:500;background:#fff;border:2.5px solid var(--border);color:var(--ink);padding:16px 26px;border-radius:14px;cursor:pointer;transition:all .15s;line-height:1.3}
.lyric-line:hover{border-color:var(--blue);background:var(--blue-l)}
.lyric-line.correct{background:var(--green);border-color:var(--green);color:#fff}
.lyric-line.wrong{background:#fee2e2;border-color:var(--rose)}
.chips{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.chip{font-size:24px;font-weight:600;background:var(--blue-l);border:2px solid var(--blue);color:#075985;padding:14px 24px;border-radius:12px;cursor:pointer;transition:all .15s}
.chip:hover{transform:translateY(-2px)}
.chip.used{opacity:.35;pointer-events:none}
.slot-line{font-size:30px;font-weight:600;color:var(--ink);text-align:center;line-height:1.5}
.slot{display:inline-block;min-width:150px;border-bottom:3px dashed var(--green);padding:2px 12px;color:var(--green-d);font-weight:700}
.fb{text-align:center;font-size:24px;font-weight:700;min-height:34px}
.fb.ok{color:var(--green-d)}
.fb.no{color:var(--rose)}
.win-tag{text-align:center;font-size:22px;font-weight:700;color:var(--green-d)}

/* ===== Academic grid ===== */
.ac-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:24px;flex:1;margin-top:26px;min-height:0}
.ac-card{border-radius:20px;padding:26px 30px;display:flex;flex-direction:column;color:#fff;position:relative;overflow:hidden;cursor:pointer}
.ac-card .acw{font-size:40px;font-weight:800}
.ac-card .ace{font-size:40px;position:absolute;top:22px;right:26px;opacity:.9}
.ac-card .acq{font-size:22px;font-weight:500;margin-top:10px;line-height:1.35}
.ac-card .acopts{display:flex;gap:12px;margin-top:auto;flex-wrap:wrap}
.ac-o{font-size:19px;font-weight:600;background:rgba(255,255,255,.9);color:var(--ink);padding:10px 18px;border-radius:11px;cursor:pointer;transition:all .12s}
.ac-o:hover{transform:translateY(-2px)}
.ac-o.correct{background:#052e16;color:#fff}
.ac-o.wrong{background:#7f1d1d;color:#fff}
.ac-done .ac-reveal{opacity:1;max-height:80px}
.ac-reveal{opacity:0;max-height:0;overflow:hidden;transition:all .4s;font-size:19px;font-weight:600;margin-top:8px}

/* ===== Karaoke lyrics ===== */
.kar{flex:1;display:flex;gap:34px;margin-top:24px;min-height:0}
.kar-main{flex:1;background:var(--surface);border:2px solid var(--border);border-radius:22px;padding:34px 44px;overflow:auto}
.kar-verse-label{font-size:17px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin:14px 0 8px}
.kar-verse-label.chorus{color:var(--amber)}
.kl{font-size:27px;font-weight:500;color:var(--ink);line-height:1.7;padding:2px 0}
.kw{display:inline-block;font-weight:700;color:var(--green-d);background:var(--green-l);border-radius:8px;padding:1px 9px;cursor:pointer;transition:all .15s;border:2px solid transparent}
.kw:hover{border-color:var(--green)}
.kw.tapped{background:var(--green);color:#fff}
.kar-side{width:300px;background:var(--green-l);border:2px solid var(--green);border-radius:22px;padding:28px 26px;display:flex;flex-direction:column}
.kar-side h4{font-size:23px;font-weight:700;color:var(--green-d);margin-bottom:14px}
.kar-count{font-size:78px;font-weight:900;color:var(--green);line-height:1;text-align:center;margin:10px 0}
.kar-side p{font-size:19px;color:var(--ink-2);line-height:1.45}
.kar-found{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.kar-found span{font-size:17px;font-weight:600;background:#fff;border:1.5px solid var(--green);color:var(--green-d);padding:5px 11px;border-radius:999px}

/* ===== Generic info panels ===== */
.panel{background:var(--surface);border:2px solid var(--border);border-radius:22px;padding:34px 40px;font-size:24px;color:var(--ink-2);line-height:1.5}
.expert-tag{display:inline-flex;align-items:center;gap:10px;font-size:18px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-bottom:8px}
.two-col{display:flex;gap:34px;flex:1;margin-top:24px;min-height:0}
.photo-card{width:42%;background:linear-gradient(140deg,#0c5e8a,#0EA5E9);border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:40px;position:relative;overflow:hidden}
.photo-card .pe{font-size:150px}
.photo-card .pc{font-size:23px;font-weight:600;margin-top:14px;background:rgba(0,0,0,.22);padding:8px 18px;border-radius:10px}
.fact-list{flex:1;display:flex;flex-direction:column;gap:16px;justify-content:center}
.fact{background:var(--surface);border:2px solid var(--border);border-left:8px solid var(--blue);border-radius:16px;padding:20px 26px;font-size:23px;color:var(--ink-2);line-height:1.4}
.fact b{color:var(--ink)}

/* write new lines */
.wnl{flex:1;display:flex;flex-direction:column;gap:20px;margin-top:24px;min-height:0}
.wnl-model{background:var(--amber-l);border:2px solid var(--amber);border-radius:16px;padding:22px 30px;font-size:26px;color:#7c5b06;font-weight:600;line-height:1.5}
.wnl-build{background:var(--surface);border:2px solid var(--border);border-radius:18px;padding:30px;flex:1;display:flex;flex-direction:column;gap:20px;justify-content:center}
.wnl-frame{font-size:34px;font-weight:600;color:var(--ink);text-align:center;line-height:1.6}
.wnl-frame .blank{display:inline-block;min-width:240px;border-bottom:4px solid var(--green);margin:0 6px;color:var(--green-d);font-weight:800;padding-bottom:2px}

/* assessment */
.assess{flex:1;display:flex;flex-direction:column;gap:18px;margin-top:24px;justify-content:center}
.assess-row{display:flex;align-items:center;gap:22px;background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:22px 30px}
.assess-row .qn{font-size:26px;color:var(--ink);font-weight:500;flex:1;line-height:1.35}
.assess-btns{display:flex;gap:12px}
.ab{font-size:22px;font-weight:700;padding:12px 26px;border-radius:12px;border:2.5px solid var(--border);background:#fff;cursor:pointer;transition:all .15s}
.ab.yes:hover{border-color:var(--green);color:var(--green-d)}
.ab.no:hover{border-color:var(--rose);color:var(--rose)}
.ab.on-yes{background:var(--green);color:#fff;border-color:var(--green)}
.ab.on-no{background:var(--rose);color:#fff;border-color:var(--rose)}

/* great job */
.gj{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  background:radial-gradient(circle at 50% 30%,#1f7a43,#16A34A 60%,#0f7a55);margin:-70px -96px -96px;color:#fff;position:relative;overflow:hidden}
.gj .trophy{font-size:140px;animation:float 3s ease-in-out infinite}
.gj h2{font-size:104px;font-weight:900;letter-spacing:-.02em;margin:6px 0}
.gj .checks{display:flex;flex-direction:column;gap:12px;margin-top:18px}
.gj .ck{font-size:26px;font-weight:600;background:rgba(255,255,255,.16);padding:12px 28px;border-radius:14px}

/* ===== Nav bar ===== */
#nav{position:fixed;left:0;right:0;bottom:0;height:52px;background:rgba(18,36,29,.96);display:flex;align-items:center;justify-content:center;gap:26px;z-index:50;color:#fff}
#nav button{background:none;border:none;color:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;opacity:.8;display:flex;align-items:center;gap:6px}
#nav button:hover{opacity:1}
#nav .nbtn{background:var(--green);padding:7px 16px;border-radius:8px;opacity:1}
#prog{font-size:14px;opacity:.7;min-width:96px;text-align:center}
.arrowbtn{font-size:20px}

/* ===== Notes panel ===== */
#notes{position:fixed;top:0;right:-460px;width:440px;height:100%;background:#fff;box-shadow:-8px 0 40px rgba(0,0,0,.22);z-index:60;transition:right .3s ease;padding:34px 32px;overflow:auto}
#notes.open{right:0}
#notes h3{font-size:15px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--green);margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:12px}
#notes .tn-lbl{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin:18px 0 4px}
#notes p{font-size:17px;color:var(--ink-2);line-height:1.5;margin-bottom:8px}
#notes b{color:var(--ink)}
#notes .say{background:var(--green-l);border-left:4px solid var(--green);padding:10px 14px;border-radius:8px;font-style:italic;color:var(--ink)}
#closeNotes{position:absolute;top:24px;right:24px;font-size:22px;cursor:pointer;color:var(--ink-3);background:none;border:none}
</style>
</head>
<body>
<div id="scaler">
  <div id="stage"><!-- SLIDES_INJECTED_HERE --></div>
</div>

<div id="nav">
  <button class="arrowbtn" onclick="prevSlide()">◀</button>
  <span id="prog">1 / 1</span>
  <button class="arrowbtn" onclick="nextSlide()">▶</button>
  <button class="nbtn" onclick="toggleNotes()">📝 Notes (N)</button>
</div>

<div id="notes">
  <button id="closeNotes" onclick="toggleNotes()">✕</button>
  <h3>Teacher Notes</h3>
  <div id="notesBody"></div>
</div>

<script>
/* ===================================================================
   UNIT 8 · SONG · "What's Your Hobby?"  — interactive slide engine
   =================================================================== */

/* ---------- VOCAB REFRESH GAMES (recycled words = light) ---------- */
const VOCAB = [
  { word:"score", emoji:"📊🏅", ipa:"/skɔːr/", pos:"Noun", tag:"recycle",
    dad:`Dad 💬 "Harry Kane had the highest <b>score</b> in the Bundesliga this year — 33 goals!"`,
    def:"Your score = the number of points you have in a game.",
    game:{type:"lyric", prompt:"Tap the line where you hear the word <b>score</b>.",
      lines:["The boy who has the highest score wins the video game.","Who enjoys a comic book?","I have a hobby, too!"], correct:0} },

  { word:"collect", emoji:"🗂️🪙", ipa:"/kəˈlɛkt/", pos:"Verb", tag:"recycle",
    dad:`Dad 💬 "Do you <b>collect</b> soccer cards? I used to collect them too!"`,
    def:"Collect = to bring together things you like and keep them.",
    game:{type:"tf", statement:"In the song, the singer says: \u201CI collect stuffed animals.\u201D", answer:true} },

  { word:"enjoy", emoji:"😄🎉", ipa:"/ɪnˈdʒɔɪ/", pos:"Verb", tag:"recycle",
    dad:`Dad 💬 "I really <b>enjoy</b> watching the Champions League with you."`,
    def:"Enjoy = to like doing something and feel happy.",
    game:{type:"gap", before:"Who", after:"a comic book?", chips:["enjoys","collects","takes"], answer:"enjoys"} },

  { word:"compete", emoji:"🏆⚔️", ipa:"/kəmˈpiːt/", pos:"Verb", tag:"recycle",
    dad:`Dad 💬 "Kane and Haaland <b>compete</b> for the Golden Boot every season."`,
    def:"Compete = to try to win against other people.",
    game:{type:"pick", prompt:"What does <b>compete</b> mean?", opts:["to try to win","to fall asleep","to draw a picture"], correct:0} },

  { word:"take photos", emoji:"📸🌿", ipa:"/teɪk ˈfoʊtoʊz/", pos:"Verb phrase", tag:"recycle",
    dad:`Dad 💬 "Let's <b>take photos</b> at the stadium on Saturday!"`,
    def:"Take photos = to use a camera to make pictures.",
    game:{type:"scramble", prompt:"Put the words in the right order.", pieces:["photos","take"], answer:"take photos"} },

  { word:"a screen", emoji:"📺🖥️", ipa:"/skriːn/", pos:"Noun", tag:"recycle",
    dad:`Dad 💬 "Look at the <b>screen</b> — the goal is on TV!"`,
    def:"A screen = the flat glass part of a phone or TV where you see pictures.",
    game:{type:"tf", statement:"A screen is the flat part of a phone or TV where you see pictures.", answer:true} },

  { word:"cooperate", emoji:"🤜🤛", ipa:"/koʊˈɒpəreɪt/", pos:"Verb", tag:"recycle",
    dad:`Dad 💬 "Good teams <b>cooperate</b> — they work together to score."`,
    def:"Cooperate = to work together with other people.",
    game:{type:"gap", before:"Do you like to", after:"with your team?", chips:["cooperate","compete","collect"], answer:"cooperate"} },

  { word:"alone", emoji:"🧍🔇", ipa:"/əˈloʊn/", pos:"Adverb", tag:"recycle",
    dad:`Dad 💬 "Sometimes I like to practice soccer <b>alone</b>, just me and the ball."`,
    def:"Alone = by yourself, with no other people.",
    game:{type:"pick", prompt:"Which one means <b>alone</b>?", opts:["by yourself","with friends","very fast"], correct:0} },

  { word:"creative", emoji:"🎨💡", ipa:"/kriˈeɪtɪv/", pos:"Adjective", tag:"recycle",
    dad:`Dad 💬 "Lamine Yamal is so <b>creative</b> with the ball at Barcelona!"`,
    def:"Creative = good at making new and interesting things.",
    game:{type:"lyric", prompt:"Tap the line where you hear <b>creative</b>.",
      lines:["Who likes to compete?","It's fun to be creative and show what you can do.","I have a hobby, too!"], correct:1} },

  { word:"a fossil", emoji:"🦴🪨", ipa:"/ˈfɒsəl/", pos:"Noun", tag:"recycle",
    dad:`Dad 💬 "We saw a real dinosaur <b>fossil</b> at the museum!"`,
    def:"A fossil = the old shape of an animal or plant, kept in rock for a very long time.",
    game:{type:"tf", statement:"A fossil is a very old shape of a plant or animal in rock.", answer:true} },

  { word:"a comic book", emoji:"📖💥", ipa:"/ˈkɒmɪk bʊk/", pos:"Noun", tag:"recycle",
    dad:`Dad 💬 "Batman is in my favorite <b>comic book</b>."`,
    def:"A comic book = a book that tells a story with pictures.",
    game:{type:"gap", before:"I like to read a", after:"about superheroes.", chips:["comic book","fossil","screen"], answer:"comic book"} },

  { word:"a stuffed animal", emoji:"🧸❤️", ipa:"/stʌft ˈænɪməl/", pos:"Noun", tag:"recycle",

  </div></div>`).join('')}
</div>`, initAssess);
NOTES[SLIDE_HTML.length-1]=`<p class="tn-lbl">Honest check</p><p>"Not yet" is fine — it just tells us what to sing again next time. Tap together with Leo.</p>`;

/* ---- S31 Great Job ---- */
add(`<div class="gj">
  <div class="trophy">🏆</div>
  <h2>Great Job, Leo!</h2>
  <div class="checks">
    <div class="ck">✅ You sang "What's Your Hobby?"</div>
    <div class="ck">✅ New words: chorus 🔁 · verse 📜 · rhyme 🎶</div>
    <div class="ck">✅ You found our hobby words in the song</div>
    <div class="ck">✅ You wrote your own line!</div>
  </div>
  <div class="t-badge" style="margin-top:30px;background:rgba(255,255,255,.2)">Keep singing! 🎶</div>
</div>`);
NOTES[SLIDE_HTML.length-1]=`<p class="tn-lbl">Celebrate</p><p>Big finish. Ask Leo to sing the chorus one last time, on his own. High five.</p>`;

/* render */
stage.innerHTML = SLIDE_HTML.join('');
const slides = [...document.querySelectorAll('.slide')];

/* ===================================================================
   GAMES
   =================================================================== */
function reveal(slot){ const d=document.getElementById(slot+"_def"); if(d) d.classList.add("show"); }

function initGame(g, slot){
  const el=document.getElementById(slot); if(!el||el.dataset.done) return;
  if(g.type==="lyric"){
    el.innerHTML=`<div class="q-prompt">${g.prompt}</div><div class="lyric-lines">${g.lines.map((l,i)=>`<div class="lyric-line" data-i="${i}">${l}</div>`).join('')}</div>`;
    el.querySelectorAll(".lyric-line").forEach(line=>line.onclick=()=>{
      if(+line.dataset.i===g.correct){line.classList.add("correct");reveal(slot);el.dataset.done=1;}
      else{line.classList.add("wrong");setTimeout(()=>line.classList.remove("wrong"),500);}
    });
  }
  else if(g.type==="tf"){
    el.innerHTML=`<div class="q-prompt">${g.statement}</div><div class="opts"><div class="opt" data-v="true">✓ True</div><div class="opt" data-v="false">✗ False</div></div><div class="fb" id="${slot}fb"></div>`;
    el.querySelectorAll(".opt").forEach(o=>o.onclick=()=>{
      const v=(o.dataset.v==="true"); const fb=document.getElementById(slot+"fb");
      if(v===g.answer){o.classList.add("correct");fb.className="fb ok";fb.textContent="Yes! 🎉";reveal(slot);el.dataset.done=1;}
      else{o.classList.add("wrong");fb.className="fb no";fb.textContent="Try again!";setTimeout(()=>o.classList.remove("wrong"),500);}
    });
  }
  else if(g.type==="gap"){
    el.innerHTML=`<div class="slot-line">${g.before} <span class="slot" id="${slot}s">______</span> ${g.after}</div><div class="chips" style="margin-top:6px">${g.chips.map(c=>`<span class="chip" data-c="${c}">${c}</span>`).join('')}</div><div class="fb" id="${slot}fb"></div>`;
    el.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
      const fb=document.getElementById(slot+"fb");
      if(c.dataset.c===g.answer){document.getElementById(slot+"s").textContent=g.answer;c.classList.add("used");fb.className="fb ok";fb.textContent="Perfect! 🎉";reveal(slot);el.dataset.done=1;}
      else{c.style.background="#fee2e2";fb.className="fb no";fb.textContent="Not that one!";setTimeout(()=>c.style.background="",500);}
    });
  }
  else if(g.type==="pick"){
    el.innerHTML=`<div class="q-prompt">${g.prompt}</div><div class="opts">${g.opts.map((o,i)=>`<div class="opt" data-i="${i}">${o}</div>`).join('')}</div>`;
    el.querySelectorAll(".opt").forEach(o=>o.onclick=()=>{
      if(+o.dataset.i===g.correct){o.classList.add("correct");reveal(slot);el.dataset.done=1;}
      else{o.classList.add("wrong");setTimeout(()=>o.classList.remove("wrong"),500);}
    });
  }
  else if(g.type==="scramble"){
    const jc = g.joinChar===undefined?" ":g.joinChar;
    let order=[];
    const pieces=[...g.pieces].sort(()=>Math.random()-.5);
    el.innerHTML=`<div class="q-prompt">${g.prompt}</div><div class="slot-line"><span class="slot" id="${slot}s" style="min-width:280px">______</span></div><div class="chips">${pieces.map(p=>`<span class="chip" data-p="${p}">${p}</span>`).join('')}</div><div class="fb" id="${slot}fb"></div>`;
    el.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
      if(c.classList.contains("used"))return;
      c.classList.add("used");order.push(c.dataset.p);
      document.getElementById(slot+"s").textContent=order.join(jc);
      const fb=document.getElementById(slot+"fb");
      if(order.length===g.pieces.length){
        if(order.join(jc).toLowerCase()===g.answer.toLowerCase()){fb.className="fb ok";fb.textContent="You got it! 🎉";reveal(slot);el.dataset.done=1;}
        else{fb.className="fb no";fb.textContent="Hmm, tap reset.";el.querySelectorAll(".chip").forEach(x=>x.classList.remove("used"));order=[];setTimeout(()=>{document.getElementById(slot+"s").textContent="______";fb.textContent="";},900);}
      }
    });
  }
}

/* NEW words */
function initNew(v, slot){
  const el=document.getElementById(slot); if(!el||el.dataset.done)return;
  if(v.game.type==="chorus"){
    el.innerHTML=`<div class="q-prompt">Which part do we sing <b>again and again</b>?</div><div class="opts">
      <div class="opt" data-ok="1">The Chorus</div><div class="opt" data-ok="0">Verse 1</div><div class="opt" data-ok="0">The Bridge</div></div><div class="win-tag" id="${slot}w" style="opacity:0">🔁 The chorus repeats 3 times in this song!</div>`;
  } else if(v.game.type==="verse"){
    el.innerHTML=`<div class="q-prompt">Which part <b>tells the story</b> and changes each time?</div><div class="opts">
      <div class="opt" data-ok="0">The Chorus</div><div class="opt" data-ok="1">A Verse</div></div><div class="win-tag" id="${slot}w" style="opacity:0">📜 Each verse is different — it tells a new part!</div>`;
  } else { // rhyme
    el.innerHTML=`<div class="q-prompt">Which word <b>rhymes</b> with <b>do</b>?</div><div class="opts">
      <div class="opt" data-ok="1">too</div><div class="opt" data-ok="0">book</div><div class="opt" data-ok="0">game</div></div><div class="win-tag" id="${slot}w" style="opacity:0">🎶 do + too = rhyme! Same ending sound.</div>`;
  }
  el.querySelectorAll(".opt").forEach(o=>o.onclick=()=>{
    if(o.dataset.ok==="1"){o.classList.add("correct");const w=document.getElementById(slot+"w");if(w)w.style.opacity=1;reveal(slot);el.dataset.done=1;}
    else{o.classList.add("wrong");setTimeout(()=>o.classList.remove("wrong"),500);}
  });
}

/* Hobbies board */
function initHobbies(){
  const board=document.getElementById("hobbyBoard"); if(board.dataset.done)return; board.dataset.done=1;
  const hobbies=["⚽ playing soccer","📸 taking photos","🗂️ collecting cards","🎮 video games","📖 reading comics","🎨 drawing","🦖 dinosaurs","🎵 music"];
  board.innerHTML=hobbies.map(h=>`<span class="chip">${h}</span>`).join('');
  board.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{ c.style.background=c.style.background?"":"var(--green)"; c.style.color=c.style.color?"":"#fff"; });
}

/* Karaoke */
function initKaraoke(mainId,countId,foundId){
  const main=document.getElementById(mainId); if(main.dataset.done)return; main.dataset.done=1;
  let count=0; const found=new Set();
  main.querySelectorAll(".kw").forEach(w=>w.onclick=()=>{
    if(w.classList.contains("tapped"))return;
    w.classList.add("tapped");count++;
    document.getElementById(countId).textContent=count;
    const word=w.dataset.w; if(!found.has(word)){found.add(word);
      const s=document.createElement("span");s.textContent=word;document.getElementById(foundId).appendChild(s);}
  });
}

/* Which verse */
function initWhichVerse(WV){
  document.querySelectorAll("[data-wv]").forEach(b=>b.onclick=()=>{
    const i=+b.dataset.wv, v=+b.dataset.v; const row=b.closest(".assess-row");
    if(row.dataset.done)return;
    if(v===WV[i].v){b.classList.add("on-yes");row.dataset.done=1;}
    else{b.classList.add("on-no");setTimeout(()=>b.classList.remove("on-no"),500);}
  });
}

/* Swap */
function initSwap(){
  document.querySelectorAll("[data-sw]").forEach(c=>c.onclick=()=>{
    const grp=c.dataset.sw; const fb=document.getElementById("swfb");
    if(c.dataset.ok==="1"){
      document.getElementById("sw"+grp).textContent=c.textContent;
      document.querySelectorAll(`[data-sw="${grp}"]`).forEach(x=>x.classList.add("used"));
      c.classList.remove("used"); c.style.background="var(--green)"; c.style.color="#fff"; c.style.borderColor="var(--green)";
      fb.className="fb ok"; fb.textContent="Nice swap! Now sing the new line. 🎶";
    } else { c.style.background="#fee2e2"; setTimeout(()=>c.style.background="",500); }
  });
}

/* Who preview */
function initWho(){
  document.querySelectorAll("[id^='who']").forEach(card=>{
    if(!/^who\d+$/.test(card.id))return;
    card.onclick=()=>{ const a=document.getElementById("whoa"+card.id.slice(3)); if(a)a.style.opacity=1; };
  });
}

/* Write lines */
function initWriteLines(){
  const fb=document.getElementById("wnlfb"); let r1=null,r2=null;
  document.querySelectorAll("[data-row]").forEach(c=>c.onclick=()=>{
    const row=c.dataset.row;
    document.querySelectorAll(`[data-row="${row}"]`).forEach(x=>{x.style.background="";x.style.color="";});
    c.style.background="var(--green)";c.style.color="#fff";
    if(row==="1"){r1=c.dataset.t;document.getElementById("b1").textContent=c.dataset.t;}
    else{r2=c.dataset.t;document.getElementById("b2").textContent=c.dataset.t;}
    if(r1&&r2){fb.textContent="🎵 "+'"I '+r1+" because "+r2+'." Sing it!';}
  });
}

/* Assessment */
function initAssess(){
  document.querySelectorAll("[data-as]").forEach(b=>b.onclick=()=>{
    const i=b.dataset.as; document.querySelectorAll(`[data-as="${i}"]`).forEach(x=>x.classList.remove("on-yes","on-no"));
    b.classList.add(b.dataset.v==="yes"?"on-yes":"on-no");
  });
}

/* ===================================================================
   NAVIGATION
   =================================================================== */
function fitScale(){
  const s=Math.min(window.innerWidth/1920,(window.innerHeight-52)/1080);
  document.getElementById('scaler').style.transform=`translate(-50%,-50%) scale(${s})`;
}
window.addEventListener('resize',fitScale); fitScale();

function showSlide(n){
  idx=Math.max(0,Math.min(slides.length-1,n));
  slides.forEach((s,i)=>s.classList.toggle('active',i===idx));
  document.getElementById('prog').textContent=`${idx+1} / ${slides.length}`;
  document.getElementById('notesBody').innerHTML=NOTES[idx]||`<p>—</p>`;
  if(initFns[idx]) initFns[idx]();
}
function nextSlide(){ showSlide(idx+1); }
function prevSlide(){ showSlide(idx-1); }
function toggleNotes(){ document.getElementById('notes').classList.toggle('open'); }

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextSlide();}
  else if(e.key==='ArrowLeft'){prevSlide();}
  else if(e.key==='n'||e.key==='N'){toggleNotes();}
});

showSlide(0);
</script>
</script>
